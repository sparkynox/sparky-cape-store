<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Sparky Cape Store</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#000;color:#fff;font-family:'Rajdhani',sans-serif;min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(255,0,51,.05),transparent 50%);pointer-events:none;z-index:0;}

  nav{
    position:sticky;top:0;z-index:100;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 32px;height:60px;
    background:rgba(0,0,0,.9);backdrop-filter:blur(20px);
    border-bottom:1px solid rgba(255,0,51,.15);
  }
  .nav-logo{font-family:'Orbitron',monospace;font-size:14px;font-weight:900;background:linear-gradient(135deg,#FF0033,#FF69B4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px;}
  .nav-right{display:flex;align-items:center;gap:16px;}
  .nav-user{color:rgba(255,255,255,.4);font-size:13px;letter-spacing:1px;}
  .btn-logout{background:rgba(255,0,51,.1);border:1px solid rgba(255,0,51,.3);color:#FF6B6B;padding:6px 16px;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .3s;letter-spacing:1px;}
  .btn-logout:hover{background:rgba(255,0,51,.2);}

  main{position:relative;z-index:1;padding:32px;}

  .page-header{margin-bottom:32px;}
  .page-tag{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:#FF0033;margin-bottom:8px;display:block;}
  .page-title{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;margin-bottom:4px;}
  .page-title span{background:linear-gradient(135deg,#FF0033,#FF69B4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .page-desc{color:rgba(255,255,255,.35);font-size:14px;}

  /* Stats */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:32px;}
  .stat-card{background:#0C0C16;border:1px solid #1A1A1A;border-radius:10px;padding:20px;text-align:center;}
  .stat-num{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;background:linear-gradient(135deg,#FF0033,#FF69B4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:block;}
  .stat-label{font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.35);text-transform:uppercase;margin-top:4px;display:block;}

  /* Filters */
  .filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
  .filter-btn{padding:7px 18px;border:1px solid #1A1A1A;border-radius:6px;background:transparent;color:rgba(255,255,255,.4);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .3s;}
  .filter-btn.active,.filter-btn:hover{background:linear-gradient(135deg,#FF0033,#FF69B4);color:white;border-color:transparent;}
  .search{flex:1;min-width:200px;background:rgba(255,255,255,.03);border:1px solid #1A1A1A;border-radius:6px;padding:8px 14px;color:white;font-family:'Rajdhani',sans-serif;font-size:14px;outline:none;transition:all .3s;}
  .search:focus{border-color:#FF0033;}
  .search::placeholder{color:rgba(255,255,255,.2);}

  /* Table */
  .table-wrap{background:#0C0C16;border:1px solid #1A1A1A;border-radius:12px;overflow:hidden;}
  table{width:100%;border-collapse:collapse;}
  th{padding:12px 16px;text-align:left;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.35);border-bottom:1px solid #1A1A1A;font-weight:600;background:#0A0A14;}
  td{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;font-size:14px;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,.02);}

  .cape-thumb{width:30px;height:48px;border-radius:3px;object-fit:cover;image-rendering:pixelated;}
  .cape-thumb-canvas{width:30px;height:48px;border-radius:3px;image-rendering:pixelated;}

  .type-badge{display:inline-block;padding:2px 10px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
  .type-static{background:rgba(0,204,255,.1);color:#00CCFF;border:1px solid rgba(0,204,255,.2);}
  .type-animated{background:rgba(255,0,51,.1);color:#FF69B4;border:1px solid rgba(255,105,180,.2);}
  .type-skin{background:rgba(0,255,136,.1);color:#00FF88;border:1px solid rgba(0,255,136,.2);}

  .btn-delete{background:rgba(255,0,51,.1);border:1px solid rgba(255,0,51,.2);color:#FF4444;padding:5px 14px;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .3s;text-transform:uppercase;}
  .btn-delete:hover{background:rgba(255,0,51,.25);border-color:#FF0033;}

  .empty{text-align:center;padding:60px;color:rgba(255,255,255,.2);font-size:14px;letter-spacing:2px;}

  /* Confirm modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
  .modal-overlay.active{opacity:1;pointer-events:all;}
  .modal{background:#0C0C16;border:1px solid rgba(255,0,51,.2);border-radius:14px;padding:32px;width:90%;max-width:380px;text-align:center;transform:scale(.95);transition:all .3s;}
  .modal-overlay.active .modal{transform:scale(1);}
  .modal-icon{font-size:36px;margin-bottom:12px;display:block;}
  .modal-title{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;margin-bottom:8px;color:#FF4444;}
  .modal-desc{color:rgba(255,255,255,.4);font-size:13px;margin-bottom:24px;line-height:1.5;}
  .modal-btns{display:flex;gap:10px;justify-content:center;}
  .btn-cancel{padding:10px 24px;background:transparent;border:1px solid #333;color:rgba(255,255,255,.5);border-radius:8px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .3s;letter-spacing:1px;}
  .btn-cancel:hover{border-color:#555;color:white;}
  .btn-confirm-del{padding:10px 24px;background:linear-gradient(135deg,#FF0033,#CC0022);border:none;color:white;border-radius:8px;font-family:'Orbitron',monospace;font-size:11px;font-weight:700;cursor:pointer;transition:all .3s;letter-spacing:1px;}
  .btn-confirm-del:hover{box-shadow:0 0 20px rgba(255,0,51,.4);}

  /* Toast */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:linear-gradient(135deg,#FF0033,#FF69B4);color:white;padding:12px 24px;border-radius:100px;font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:2px;z-index:9999;transition:transform .4s cubic-bezier(.175,.885,.32,1.275);}
  .toast.show{transform:translateX(-50%) translateY(0);}

  @media(max-width:600px){
    main{padding:16px;}
    .filters{flex-direction:column;}
    .search{min-width:unset;width:100%;}
    td:nth-child(4),th:nth-child(4){display:none;}
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">ADMIN PANEL</div>
  <div class="nav-right">
    <span class="nav-user" id="navUser">Loading...</span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<main>
  <div class="page-header">
    <span class="page-tag">✦ Admin</span>
    <h1 class="page-title">Cape <span>Manager</span></h1>
    <p class="page-desc">View and delete community uploaded capes & skins.</p>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card"><span class="stat-num" id="statTotal">0</span><span class="stat-label">Total</span></div>
    <div class="stat-card"><span class="stat-num" id="statStatic">0</span><span class="stat-label">Static</span></div>
    <div class="stat-card"><span class="stat-num" id="statAnim">0</span><span class="stat-label">Animated</span></div>
    <div class="stat-card"><span class="stat-num" id="statSkins">0</span><span class="stat-label">Skins</span></div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter(event,'all')">All</button>
    <button class="filter-btn" onclick="setFilter(event,'static')">Static</button>
    <button class="filter-btn" onclick="setFilter(event,'animated')">Animated</button>
    <button class="filter-btn" onclick="setFilter(event,'skin')">Skins</button>
    <input class="search" type="text" placeholder="Search by name or author..." oninput="renderTable()">
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Preview</th>
          <th>Name</th>
          <th>Type</th>
          <th>Author</th>
          <th>Date</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</main>

<!-- Confirm delete modal -->
<div class="modal-overlay" id="delModal">
  <div class="modal">
    <span class="modal-icon">🗑️</span>
    <div class="modal-title">Delete Cape?</div>
    <div class="modal-desc" id="delDesc">Are you sure you want to delete this cape? This cannot be undone.</div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeDelModal()">Cancel</button>
      <button class="btn-confirm-del" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Auth check ────────────────────────────────────────────────────────────────
const token = sessionStorage.getItem('scs_admin_token');
const adminUser = sessionStorage.getItem('scs_admin_user');
if (!token) { window.location.href = '/admin/login.html'; }
document.getElementById('navUser').textContent = adminUser || 'Admin';

function logout() {
  sessionStorage.removeItem('scs_admin_token');
  sessionStorage.removeItem('scs_admin_user');
  window.location.href = '/admin/login.html';
}

// ── Data ──────────────────────────────────────────────────────────────────────
function getUploads() {
  try { return JSON.parse(localStorage.getItem('scs_v2') || '[]'); } catch(e) { return []; }
}
function saveUploads(arr) {
  localStorage.setItem('scs_v2', JSON.stringify(arr));
}

let currentFilter = 'all';
let deleteTargetId = null;

function setFilter(e, type) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  renderTable();
}

function renderTable() {
  const query = document.querySelector('.search').value.toLowerCase();
  const all = getUploads();

  // Update stats
  document.getElementById('statTotal').textContent = all.length;
  document.getElementById('statStatic').textContent = all.filter(c=>c.type==='static').length;
  document.getElementById('statAnim').textContent = all.filter(c=>c.type==='animated').length;
  document.getElementById('statSkins').textContent = all.filter(c=>c.type==='skin').length;

  const filtered = all.filter(c => {
    const matchType = currentFilter === 'all' || c.type === currentFilter;
    const matchSearch = !query ||
      c.name?.toLowerCase().includes(query) ||
      c.author?.toLowerCase().includes(query);
    return matchType && matchSearch;
  });

  const tbody = document.getElementById('tableBody');

  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty">No items found</td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(c => {
    const date = c.uploadedAt
      ? new Date(c.uploadedAt).toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'numeric'})
      : '—';
    const typeClass = c.type === 'animated' ? 'type-animated' : c.type === 'skin' ? 'type-skin' : 'type-static';
    const canvasId = `thumb_${c.id}`;

    return `
      <tr>
        <td><canvas id="${canvasId}" width="30" height="48" class="cape-thumb-canvas"></canvas></td>
        <td><strong>${c.name || '—'}</strong></td>
        <td><span class="type-badge ${typeClass}">${c.type || 'static'}</span></td>
        <td style="color:rgba(255,255,255,.5)">${c.author || 'Anonymous'}</td>
        <td style="color:rgba(255,255,255,.35);font-size:12px">${date}</td>
        <td><button class="btn-delete" onclick="openDelModal('${c.id}','${(c.name||'').replace(/'/g,"\\'")}')">Delete</button></td>
      </tr>
    `;
  }).join('');

  // Render previews
  requestAnimationFrame(() => {
    filtered.forEach(c => {
      const canvas = document.getElementById(`thumb_${c.id}`);
      if (!canvas || !c.imgUrl) return;
      renderThumb(canvas, c.imgUrl);
    });
  });
}

function renderThumb(canvas, imgSrc) {
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.onload = () => {
    ctx.clearRect(0,0,30,48);
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    const w = img.naturalWidth, h = img.naturalHeight;
    if (h === w) {
      // Skin
      ctx.drawImage(img, w*(8/64), h*(8/64), w*(8/64), h*(8/64), 4, 4, 22, 22);
    } else {
      // Cape front face
      ctx.drawImage(img, w*(1/64), h*(1/32), w*(10/64), h*(16/32), 0, 0, 30, 48);
    }
  };
  img.src = imgSrc;
}

// ── Delete ────────────────────────────────────────────────────────────────────
function openDelModal(id, name) {
  deleteTargetId = id;
  document.getElementById('delDesc').textContent =
    `Delete "${name}"? This cannot be undone.`;
  document.getElementById('delModal').classList.add('active');
}

function closeDelModal() {
  deleteTargetId = null;
  document.getElementById('delModal').classList.remove('active');
}

function confirmDelete() {
  if (!deleteTargetId) return;
  const all = getUploads();
  const updated = all.filter(c => c.id !== deleteTargetId);
  saveUploads(updated);
  closeDelModal();
  renderTable();
  showToast('Deleted!');
}

document.getElementById('delModal').addEventListener('click', e => {
  if (e.target.id === 'delModal') closeDelModal();
});

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderTable();
</script>
</body>
</html>
